[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@pythnetwork/pyth-sdk-solidity/=lib/pyth-sdk-solidity/",
    "@aave/v3-core/=lib/aave-v3-core/"
]

[rpc_endpoints]
ethereum = "${ETH_RPC}"
sepolia = "${SEPOLIA_RPC}"
base = "${BASE_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"
arbitrum = "${ARBITRUM_RPC}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
polygon = "${POLYGON_RPC}"
polygon_amoy = "${POLYGON_AMOY_RPC}"
bsc = "${BSC_RPC}"
bsc_testnet = "${BSC_TESTNET_RPC}"
skale = "${SKALE_RPC}"
skale_testnet = "${SKALE_TESTNET_RPC}"
