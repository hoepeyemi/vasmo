name: Build and Deploy vasmo Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME_PROD }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN_PROD }}
  HOST: ${{ secrets.SSH_HOST_TEMP }}
  HOST_USERNAME: ${{ secrets.SSH_USERNAME_TEMP }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_TEMP }}
  AGENT_IMAGE: ${{ secrets.DOCKER_USERNAME_PROD }}/vasmo-agent:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build agent image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: false
          tags: vasmo-agent:pr

      - name: Build and push agent image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: ${{ env.AGENT_IMAGE }}
          cache-from: type=gha,scope=vasmo-agent
          cache-to: type=gha,mode=max,scope=vasmo-agent

      - name: Deploy to Ubuntu server
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ env.HOST_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Deployment started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            APP_DIR=/home/ubuntu/vasmo
            AGENT_ENV=$APP_DIR/.env.agent

            if [ ! -f "$AGENT_ENV" ]; then
              echo "Missing agent env file: $AGENT_ENV"
              exit 1
            fi

            echo "Creating Docker network if missing..."
            sudo docker network create vasmo-net >/dev/null 2>&1 || true

            echo "Stopping old containers..."
            sudo docker stop vasmo-agent || true
            sudo docker rm vasmo-agent || true

            echo "Pulling latest images..."
            sudo docker pull ${{ env.AGENT_IMAGE }}

            echo "Starting agent..."
            sudo docker run -d \
              --name vasmo-agent \
              --restart unless-stopped \
              --network vasmo-net \
              -p 8080:8080 \
              --env-file "$AGENT_ENV" \
              ${{ env.AGENT_IMAGE }}

            echo "Verifying deployment..."
            sleep 10

            if ! sudo docker ps --format '{{.Names}}' | grep -q '^vasmo-agent$'; then
              echo "Agent container failed to start"
              sudo docker logs vasmo-agent || true
              exit 1
            fi

            curl -fsS http://127.0.0.1:8080/health >/dev/null

            echo "Agent container is running"
            echo "Agent logs:"
            sudo docker logs --tail 30 vasmo-agent
            echo "Deployment completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Post-deploy verification
        if: github.event_name == 'push' && success()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ env.HOST_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          script: |
            if sudo docker ps --format '{{.Names}}' | grep -q '^vasmo-agent$'; then
              echo "Agent container status:"
              sudo docker inspect vasmo-agent --format='Status: {{.State.Status}} | Started At: {{.State.StartedAt}}'
              sudo docker port vasmo-agent
            else
              echo "vasmo-agent is not running"
              exit 1
            fi
