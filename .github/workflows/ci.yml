name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ============ Contracts ============
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Check formatting
        run: forge fmt --check

      - name: Build contracts
        run: forge build

      - name: Run tests
        run: forge test -vvv

  # ============ Frontend App ============
  app:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: cd app && pnpm tsc --noEmit

      - name: Lint
        run: cd app && pnpm lint --max-warnings 0 || true

      - name: Build
        run: cd app && pnpm build
        env:
          NEXT_PUBLIC_INVOICE_NFT_ADDRESS: '0x0000000000000000000000000000000000000001'
          NEXT_PUBLIC_YIELD_VAULT_ADDRESS: '0x0000000000000000000000000000000000000002'
          NEXT_PUBLIC_AGENT_ROUTER_ADDRESS: '0x0000000000000000000000000000000000000003'

  # ============ Agent Service ============
  agent:
    name: Agent (TypeScript)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: cd agent && pnpm tsc --noEmit

      - name: Run tests
        run: cd agent && pnpm test

  # ============ Pages Deployment ============
  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [contracts]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        working-directory: app
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_NETWORK_MODE: testnet
          NEXT_PUBLIC_CHAIN_ID: "5003"
          NEXT_PUBLIC_MANTLE_SEPOLIA_RPC: https://5003.rpc.thirdweb.com/
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: c812450038cb25050edbdce20ef65c61
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============ Agent Docker Deployment ============
  docker-agent:
    name: Deploy Agent (Docker)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [contracts]
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME_PROD }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN_PROD }}
      HOST: ${{ secrets.SSH_HOST_TEMP }}
      HOST_USERNAME: ${{ secrets.SSH_USERNAME_TEMP }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_TEMP }}
      AGENT_IMAGE: ${{ secrets.DOCKER_USERNAME_PROD }}/vasmo-agent:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: ${{ env.AGENT_IMAGE }}
          cache-from: type=gha,scope=vasmo-agent
          cache-to: type=gha,mode=max,scope=vasmo-agent

      - name: Deploy to Ubuntu server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ env.HOST_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Deployment started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            APP_DIR=/home/ubuntu/vasmo
            AGENT_ENV=$APP_DIR/.env.agent

            if [ ! -f "$AGENT_ENV" ]; then
              echo "Missing agent env file: $AGENT_ENV"
              exit 1
            fi

            echo "Creating Docker network if missing..."
            sudo docker network create vasmo-net >/dev/null 2>&1 || true

            echo "Stopping old containers..."
            sudo docker stop vasmo-agent || true
            sudo docker rm vasmo-agent || true

            echo "Pulling latest images..."
            sudo docker pull ${{ env.AGENT_IMAGE }}

            echo "Starting agent..."
            sudo docker run -d \
              --name vasmo-agent \
              --restart unless-stopped \
              --network vasmo-net \
              -p 8080:8080 \
              --env-file "$AGENT_ENV" \
              ${{ env.AGENT_IMAGE }}

            echo "Verifying deployment..."
            sleep 10

            if ! sudo docker ps --format '{{.Names}}' | grep -q '^vasmo-agent$'; then
              echo "Agent container failed to start"
              sudo docker logs vasmo-agent || true
              exit 1
            fi

            curl -fsS http://127.0.0.1:8080/health >/dev/null

            echo "Agent container is running"
            echo "Agent logs:"
            sudo docker logs --tail 30 vasmo-agent
            echo "Deployment completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Post-deploy verification
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ env.HOST_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          script: |
            if sudo docker ps --format '{{.Names}}' | grep -q '^vasmo-agent$'; then
              echo "Agent container status:"
              sudo docker inspect vasmo-agent --format='Status: {{.State.Status}} | Started At: {{.State.StartedAt}}'
              sudo docker port vasmo-agent
            else
              echo "vasmo-agent is not running"
              exit 1
            fi
